baseURL = 'https://coralline.club/'
locale = 'fr'
title = 'Coralline Natation Artistique'
theme = 'ananke'

[[menus.main]]
  name = "Inscription"
  url = "/inscription/"
  weight = 1

[[menus.main]]
  name = "Cours offerts"
  url = "/cours/"
  weight = 2

[[menus.main]]
  name = "Valeurs et équipe"
  url = "/equipe/"
  weight = 3

[[menus.main]]
  name = "Sport sain"
  url = "/sport-sain/"
  weight = 4

[[menus.main]]
  name = "Contact"
  url = "/contact/"
  weight = 6

[markup.goldmark.renderer]
  unsafe = true

[params]
  description = "Un club, une équipe, une famille — Natation Artistique à Repentigny et Terrebonne"
  contact_email = "info@coralline.club"
  background_color_class = "bg-coralline"
  cover_dimming_class = "bg-black-20"
  featured_image_class = "cover"

[params.ananke]
  custom_css = ["custom.css"]
  show_recent_posts = false

[params.ananke.pages]
  show_list_images = true

[params.ananke.social.follow]
  networks = ["instagram", "tiktok", "facebook"]

[params.ananke.social.instagram]
  profilelink = "https://www.instagram.com/coralline.club/"

[params.ananke.social.tiktok]
  profilelink = "https://www.tiktok.com/@club.coralline"

[params.ananke.social.facebook]
  profilelink = "https://www.facebook.com/clubcoralline"
