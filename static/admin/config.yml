backend:
  name: git-gateway
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "inscription"
    label: "Inscription"
    files:
      - file: "content/inscription.md"
        label: "Inscription"
        name: "inscription"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Ordre dans le menu (ne pas changer)", name: "weight", widget: "hidden", default: 2 }
          - label: "Saison"
            name: "saison"
            widget: "select"
            options: ["hiver", "printemps", "estivale", "automnale"]
          - { label: "Mois", name: "mois", widget: "string" }
          - { label: "Année", name: "annee", widget: "number", value_type: "int" }
          - { label: "Lien d'inscription récréative", name: "lien_recreatif", widget: "string" }
          - label: "Horaire Repentigny"
            name: "horaire_repentigny"
            widget: "list"
            summary: "{{groupe}} — {{jour}} {{heure}}"
            fields:
              - { label: "Groupe (ex: Grenouilles (5-7 ans))", name: "groupe", widget: "string" }
              - { label: "Durée (ex: 1 heure)", name: "duree", widget: "string" }
              - { label: "Jour (ex: lundi)", name: "jour", widget: "string" }
              - { label: "Heure (ex: 17h-18h)", name: "heure", widget: "string" }
              - { label: "Dates (ex: 6, 13, 20, 27 juillet)", name: "dates", widget: "string" }
          - label: "Horaire Terrebonne"
            name: "horaire_terrebonne"
            widget: "list"
            summary: "{{groupe}} — {{jour}} {{heure}}"
            fields:
              - { label: "Groupe (ex: Grenouilles (5-7 ans))", name: "groupe", widget: "string" }
              - { label: "Durée (ex: 1 heure)", name: "duree", widget: "string" }
              - { label: "Jour (ex: mercredi)", name: "jour", widget: "string" }
              - { label: "Heure (ex: 17h-18h)", name: "heure", widget: "string" }
              - { label: "Dates (ex: 8, 15, 22, 29 juillet)", name: "dates", widget: "string" }
          - { label: "Cours techniques - jours", name: "horaire_technique_jours", widget: "string" }
          - { label: "Cours techniques - heure", name: "horaire_technique_heure", widget: "string" }
          - { label: "Cours techniques - lieu", name: "horaire_technique_lieu", widget: "string" }
          - { label: "Lien d'inscription technique", name: "lien_technique", widget: "string" }

  - name: "equipe"
    label: "Valeurs et équipe"
    files:
      - file: "content/equipe.md"
        label: "Conseil d'administration"
        name: "equipe"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Ordre dans le menu (ne pas changer)", name: "weight", widget: "hidden", default: 4 }
          - label: "Membres du CA"
            name: "ca"
            widget: "list"
            summary: "{{nom}} — {{role}}"
            fields:
              - { label: "Nom", name: "nom", widget: "string" }
              - { label: "Rôle", name: "role", widget: "string" }
          - { label: "Contenu de la page (ne pas modifier ici)", name: "body", widget: "markdown" }

  - name: "accueil"
    label: "Accueil"
    files:
      - file: "content/_index.md"
        label: "Page d'accueil"
        name: "accueil"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Image bannière (ne pas modifier ici)", name: "featured_image", widget: "hidden" }
          - { label: "Cacher le titre sur la bannière (ne pas modifier ici)", name: "omit_header_text", widget: "hidden", default: true }
          - label: "Logos partenaires"
            name: "partenaires"
            widget: "list"
            summary: "{{nom}}"
            fields:
              - { label: "Nom", name: "nom", widget: "string" }
              - { label: "Lien du site", name: "lien", widget: "string" }
              - { label: "Logo", name: "image", widget: "image" }
          - label: "Galerie photos"
            name: "galerie"
            widget: "list"
            summary: "{{image}}"
            fields:
              - { label: "Photo", name: "image", widget: "image" }
          - { label: "Contenu de la page (ne pas modifier ici)", name: "body", widget: "markdown" }
